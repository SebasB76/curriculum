        - paragraph [ref=e52]: Desarrollé parte del frontend de una aplicación móvil en React Native para conectar agricultores, inversores y compradores en una sola plataforma, enfocada en facilitar el acceso a inversión y mejorar la transparencia de precios en el sector agrícola.
      - article [ref=e53]:
