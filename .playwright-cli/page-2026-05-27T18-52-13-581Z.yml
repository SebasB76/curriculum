        - paragraph [ref=e57]: Desarrollé parte del frontend de Govly, una plataforma web y móvil para centralizar información de trámites gubernamentales en Ecuador. Participé en el diseño de pantallas y funcionalidades para facilitar el acceso ciudadano a servicios públicos.
      - article [ref=e58]:
