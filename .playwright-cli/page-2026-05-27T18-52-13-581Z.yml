        - time [ref=e61]: Agosto 2025
        - paragraph [ref=e62]: Implementé un modelo de red de vuelos con grafos, aplicando el algoritmo de Dijkstra para hallar rutas óptimas entre aeropuertos. Reforcé conceptos de programación orientada a objetos, estructuras de datos, análisis de complejidad y diseño de soluciones algorítmicas.
